<!DOCTYPE html>
<html lang="ar" dir="rtl" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>لوحة التحكم</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link th:href="@{/css/app.css}" href="/css/app.css" rel="stylesheet" />
</head>
<body class="bg-light d-flex flex-column min-vh-100">
<nav class="navbar navbar-expand-lg bg-white border-bottom small shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">معرض الأعمال</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link active" th:href="@{/dashboard}">لوحة التحكم</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/artworks}">الأعمال الفنية</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/artworks/upload}">رفع عمل فني</a></li>
            </ul>
            <div class="d-flex gap-2">
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-outline-danger btn-sm">تسجيل الخروج</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<main class="flex-grow-1 py-4">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="h4 mb-0">إدارة الأعمال الفنية</h1>
            <a class="btn btn-primary btn-sm" th:href="@{/artworks/upload}">+ إضافة عمل</a>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table align-middle mb-0">
                        <thead>
                        <tr>
                            <th>#</th>
                            <th>الصورة</th>
                            <th>العنوان</th>
                            <th>الوصف</th>
                            <th>الأصوات</th>
                            <th class="text-center" style="width: 160px;">إجراءات</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="art,iter : ${artworks}" th:attr="data-row=${art.id}">
                            <td th:text="${iter.index + 1}">1</td>
                            <td>
                                <img th:src="${art.imageUrl}" alt="art" style="width: 60px; height: 45px; object-fit: cover; border-radius: .5rem;" />
                            </td>
                            <td th:text="${art.title}">عنوان</td>
                            <td class="text-muted-75" th:text="${art.description}">الوصف</td>
                            <td><span class="badge bg-light text-dark" th:text="${art.votes}" th:attr="data-votes=${art.id}">0</span></td>
                            <td class="text-center">
                                <div class="d-inline-flex gap-2">
                                    <a class="btn btn-sm btn-outline-secondary btn-icon" th:href="@{'/artworks/' + ${art.id}}">
                                        تعديل
                                    </a>
                                    <a href="#" class="btn btn-sm btn-outline-danger btn-icon" data-action="delete" th:attr="data-id=${art.id}">حذف</a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(artworks)}">
                            <td colspan="6" class="text-center text-muted py-4">لا توجد أعمال حتى الآن.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</main>

<footer class="mt-auto py-4 bg-white border-top small text-muted">
    <div class="container d-flex justify-content-between">
        <span>© <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}">2025</span> معرض الأعمال</span>
        <a class="text-decoration-none" href="https://getbootstrap.com" target="_blank" rel="noopener">Bootstrap 5</a>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body>
</html>
