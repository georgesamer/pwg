<!DOCTYPE html>
<html lang="ar" dir="rtl" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>الأعمال الفنية</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link th:href="@{/css/app.css}" href="/css/app.css" rel="stylesheet" />
</head>
<body class="bg-light d-flex flex-column min-vh-100">
<nav class="navbar navbar-expand-lg bg-white border-bottom small shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">معرض الأعمال</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link active" th:href="@{/artworks}">الأعمال الفنية</a></li>
                <li class="nav-item" sec:authorize="isAuthenticated()"><a class="nav-link" th:href="@{/dashboard}">لوحة التحكم</a></li>
            </ul>
            <div class="d-flex gap-2" sec:authorize="!isAuthenticated()">
                <a class="btn btn-outline-primary btn-sm" th:href="@{/login}">تسجيل الدخول</a>
                <a class="btn btn-primary btn-sm" th:href="@{/register}">إنشاء حساب</a>
            </div>
            <div class="d-flex gap-2" sec:authorize="isAuthenticated()">
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-outline-danger btn-sm">تسجيل الخروج</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<main class="flex-grow-1 py-4">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="h4 mb-0">الأعمال الفنية</h1>
            <a sec:authorize="isAuthenticated()" class="btn btn-primary btn-sm" th:href="@{/artworks/upload}">+ رفع عمل</a>
        </div>

        <div class="art-grid">
            <div class="card art-card shadow-sm border-0" th:each="art : ${artworks}">
                <img th:src="${art.imageUrl}" alt="art" />
                <div class="card-body">
                    <h2 class="h6" th:text="${art.title}">عنوان العمل</h2>
                    <p class="text-muted small mb-2" th:text="${art.description}">وصف مختصر للعمل الفني</p>
                    <div class="d-flex align-items-center justify-content-between">
                        <div class="small text-muted">أصوات: <span class="badge bg-light text-dark" th:text="${art.votes}" th:attr="data-votes=${art.id}">0</span></div>
                        <div class="d-flex gap-2">
                            <a sec:authorize="isAuthenticated()" href="#" class="btn btn-sm btn-outline-primary" data-action="vote" th:attr="data-id=${art.id}">تصويت</a>
                            <a class="btn btn-sm btn-outline-secondary" th:href="@{'/artworks/' + ${art.id}}">عرض</a>
                        </div>
                    </div>

                    <!-- Comments preview -->
                    <div class="mt-3">
                        <h3 class="h6 mb-2">التعليقات</h3>
                        <div class="list-group list-group-flush small">
                            <div class="list-group-item px-0 py-1" th:each="c : ${art.comments}">
                                <span class="fw-semibold" th:text="${c.author}">مستخدم</span>
                                <span class="text-muted">—</span>
                                <span th:text="${c.content}">تعليق قصير</span>
                            </div>
                            <div class="text-muted" th:if="${#lists.isEmpty(art.comments)}">لا توجد تعليقات.</div>
                        </div>
                    </div>

                    <!-- Add comment (auth only) -->
                    <form sec:authorize="isAuthenticated()" class="mt-3" th:action="@{'/api/artworks/' + ${art.id} + '/comments'}" method="post">
                        <div class="input-group input-group-sm">
                            <input type="text" class="form-control" name="content" placeholder="أضف تعليقًا" required />
                            <button class="btn btn-outline-secondary" type="submit">إرسال</button>
                        </div>
                    </form>
                </div>
            </div>
            <div th:if="${#lists.isEmpty(artworks)}" class="text-center text-muted py-5">
                لا توجد أعمال بعد.
            </div>
        </div>
    </div>
</main>

<footer class="mt-auto py-4 bg-white border-top small text-muted">
    <div class="container d-flex justify-content-between">
        <span>© <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}">2025</span> معرض الأعمال</span>
        <a class="text-decoration-none" href="https://getbootstrap.com" target="_blank" rel="noopener">Bootstrap 5</a>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body>
</html>
