<!DOCTYPE html>
<html lang="ar" dir="rtl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>403 - غير مسموح</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link th:href="@{/css/app.css}" href="/css/app.css" rel="stylesheet" />
</head>
<body class="bg-light d-flex flex-column min-vh-100">
<nav class="navbar navbar-expand-lg bg-white border-bottom small shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">معرض الأعمال</a>
    </div>
</nav>

<main class="flex-grow-1 d-flex align-items-center">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <div class="text-center">
                    <h1 class="display-5 fw-bold text-danger">403</h1>
                    <p class="lead mb-4">عذرًا، لا تملك صلاحية للوصول إلى هذه الصفحة.</p>
                    <div class="d-flex gap-2 justify-content-center">
                        <a class="btn btn-primary" th:href="@{/}">عودة إلى الرئيسية</a>
                        <a class="btn btn-outline-secondary" th:href="@{/login}">تسجيل الدخول</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="mt-auto py-4 bg-white border-top small text-muted">
    <div class="container d-flex justify-content-between">
        <span>© <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}">2025</span> معرض الأعمال</span>
        <a class="text-decoration-none" href="https://getbootstrap.com" target="_blank" rel="noopener">Bootstrap 5</a>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
