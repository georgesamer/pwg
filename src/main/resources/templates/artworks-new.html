<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artworks - Church Festival</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
    
    <!-- Navigation Fragment -->
    <div th:replace="fragments/navbar :: navbar"></div>
    
    <!-- Flash Messages -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show m-3" role="alert">
        <i class="fas fa-check-circle me-2"></i>
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show m-3" role="alert">
        <i class="fas fa-exclamation-triangle me-2"></i>
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Main Content -->
    <main class="flex-grow-1 py-4">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h3 mb-0">
                    <i class="fas fa-images me-2"></i>Artworks Gallery
                </h1>
                <div class="d-flex gap-2">
                    <!-- Category Filter -->
                    <select class="form-select form-select-sm" style="width: auto;" onchange="filterByCategory(this.value)">
                        <option value="">All Categories</option>
                        <option th:each="category : ${categories}" 
                                th:value="${category}" 
                                th:text="${category.displayName}"
                                th:selected="${selectedCategory != null && selectedCategory == category}">
                            Category
                        </option>
                    </select>
                    
                    <!-- Upload Button -->
                    <a th:href="@{/artworks/upload}" class="btn btn-primary btn-sm" sec:authorize="hasAnyRole('ADMIN', 'WORKER')">
                        <i class="fas fa-upload me-1"></i>Upload Artwork
                    </a>
                </div>
            </div>

            <!-- Artworks Grid -->
            <div class="row g-4" id="artworks-container">
                <div class="col-lg-4 col-md-6" th:each="artwork : ${artworks}">
                    <div th:replace="fragments/artwork-card :: artwork-card(${artwork})"></div>
                </div>
            </div>

            <!-- Empty State -->
            <div class="text-center py-5" th:if="${#lists.isEmpty(artworks)}">
                <i class="fas fa-palette fa-4x text-muted mb-3"></i>
                <h4 class="text-muted">No Artworks Yet</h4>
                <p class="text-muted">Be the first to share your artistic creation!</p>
                <a th:href="@{/artworks/upload}" class="btn btn-primary" sec:authorize="hasAnyRole('ADMIN', 'WORKER')">
                    <i class="fas fa-upload me-2"></i>Upload Artwork
                </a>
            </div>
        </div>
    </main>

    <!-- Footer Fragment -->
    <div th:replace="fragments/footer :: footer"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app.js}"></script>

    <script>
        function filterByCategory(category) {
            if (category === '') {
                window.location.href = '/artworks';
            } else {
                window.location.href = '/artworks/category/' + category.toLowerCase();
            }
        }

        function voteForArtwork(artworkId) {
            fetch(`/api/artworks/${artworkId}/vote`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    location.reload(); // Refresh to show updated vote count
                } else {
                    alert('Failed to vote: ' + data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('An error occurred while voting');
            });
        }
    </script>
</body>
</html>
