<!DOCTYPE html>
<html lang="ar" dir="rtl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>تسجيل الدخول</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- App CSS -->
    <link th:href="@{/css/app.css}" href="/css/app.css" rel="stylesheet" />
</head>
<body class="bg-light d-flex flex-column min-vh-100">
<nav class="navbar navbar-expand-lg bg-white border-bottom small shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">معرض الأعمال</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" th:href="@{/}">الرئيسية</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/artworks}">الأعمال الفنية</a></li>
            </ul>
            <div class="d-flex gap-2">
                <a class="btn btn-outline-primary btn-sm" th:href="@{/register}">إنشاء حساب</a>
            </div>
        </div>
    </div>
</nav>

<main class="flex-grow-1 py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4 p-md-5">
                        <h1 class="h4 mb-4 text-center">تسجيل الدخول</h1>

                        <!-- Success message when redirected with ?logout -->
                        <div class="alert alert-success d-flex align-items-center" role="alert" th:if="${param.logout}">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-check-circle me-2" viewBox="0 0 16 16">
                                <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"/>
                                <path d="M10.97 4.97a.75.75 0 0 1 1.073 1.05l-3.992 4.99a.75.75 0 0 1-1.08.02L4.324 8.384a.75.75 0 1 1 1.06-1.06l1.094 1.093 3.473-4.425a.236.236 0 0 1 .02-.022z"/>
                            </svg>
                            تم تسجيل الخروج بنجاح.
                        </div>

                        <!-- Error message when redirected with ?error -->
                        <div class="alert alert-danger d-flex align-items-center" role="alert" th:if="${param.error}">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-exclamation-triangle me-2" viewBox="0 0 16 16">
                                <path d="M7.938 2.016a.13.13 0 0 1 .125 0l6.857 3.94a.13.13 0 0 1 .063.112v7.865a.13.13 0 0 1-.063.112l-6.857 3.94a.13.13 0 0 1-.125 0l-6.857-3.94A.13.13 0 0 1 1 13.933V6.068a.13.13 0 0 1 .063-.112z"/>
                                <path d="M7.002 11a1 1 0 1 0 2 0 1 1 0 0 0-2 0M7.1 4.995a.905.905 0 1 1 1.8 0l-.35 3.507a.555.555 0 0 1-1.1 0z"/>
                            </svg>
                            اسم المستخدم أو كلمة المرور غير صحيحة.
                        </div>

                        <form th:action="@{/auth/login}" method="post" class="needs-validation" novalidate>
                            <div class="mb-3">
                                <label for="username" class="form-label">اسم المستخدم</label>
                                <input type="text" class="form-control" id="username" name="username" placeholder="example" required />
                                <div class="invalid-feedback">يرجى إدخال اسم المستخدم.</div>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">كلمة المرور</label>
                                <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required />
                                <div class="invalid-feedback">يرجى إدخال كلمة المرور.</div>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">تسجيل الدخول</button>
                            </div>
                        </form>

                        <hr class="my-4" />
                        <p class="mb-0 text-center">ليس لديك حساب؟ <a th:href="@{/register}">إنشاء حساب جديد</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="mt-auto py-4 bg-white border-top small text-muted">
    <div class="container d-flex justify-content-between">
        <span>© <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}">2025</span> معرض الأعمال</span>
        <a class="text-decoration-none" href="https://getbootstrap.com" target="_blank" rel="noopener">Bootstrap 5</a>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body>
</html>
