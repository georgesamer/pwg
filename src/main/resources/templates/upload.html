<!DOCTYPE html>
<html lang="ar" dir="rtl" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>رفع عمل فني</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link th:href="@{/css/app.css}" href="/css/app.css" rel="stylesheet" />
</head>
<body class="bg-light d-flex flex-column min-vh-100">
<nav class="navbar navbar-expand-lg bg-white border-bottom small shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">معرض الأعمال</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" th:href="@{/artworks}">الأعمال الفنية</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/artworks/upload}">رفع عمل</a></li>
            </ul>
            <div class="d-flex gap-2">
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-outline-danger btn-sm">تسجيل الخروج</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<main class="flex-grow-1 py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-8">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4 p-md-5">
                        <h1 class="h4 mb-4 text-center">رفع عمل فني</h1>
                        <form th:action="@{/api/artworks}" method="post" enctype="multipart/form-data" class="needs-validation" novalidate>
                            <div class="mb-3">
                                <label for="title" class="form-label">العنوان</label>
                                <input type="text" class="form-control" id="title" name="title" placeholder="عنوان جذاب" required>
                                <div class="invalid-feedback">يرجى إدخال العنوان.</div>
                            </div>
                            <div class="mb-3">
                                <label for="description" class="form-label">الوصف</label>
                                <textarea class="form-control" id="description" name="description" rows="4" placeholder="وصف مختصر للعمل" required></textarea>
                                <div class="invalid-feedback">يرجى إدخال الوصف.</div>
                            </div>
                            <div class="mb-3">
                                <label for="image" class="form-label">الصورة</label>
                                <input type="file" class="form-control" id="image" name="image" accept="image/*" required>
                                <div class="invalid-feedback">يرجى اختيار صورة.</div>
                            </div>
                            <div class="d-grid gap-2">
                                <button class="btn btn-primary" type="submit">رفع</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="mt-auto py-4 bg-white border-top small text-muted">
    <div class="container d-flex justify-content-between">
        <span>© <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}">2025</span> معرض الأعمال</span>
        <a class="text-decoration-none" href="https://getbootstrap.com" target="_blank" rel="noopener">Bootstrap 5</a>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body>
</html>
