<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="artwork-card(artwork)" class="card artwork-card h-100">
        <div th:if="${artwork.hasMedia()}" class="position-relative">
            <img th:src="${artwork.fileUrl}" 
                 th:alt="${artwork.title}" 
                 class="card-img-top">
            <div class="vote-badge">
                <i class="fas fa-heart me-1"></i>
                <span th:text="${artwork.voteCount}">0</span>
            </div>
        </div>
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-start mb-2">
                <h5 class="card-title mb-0" th:text="${artwork.title}">Artwork Title</h5>
                <span class="category-badge" th:text="${artwork.category.displayName}">Category</span>
            </div>
            <p class="card-text text-muted" 
               th:text="${artwork.description != null and !artwork.description.empty ? 
                        (artwork.description.length() > 100 ? 
                         artwork.description.substring(0, 100) + '...' : 
                         artwork.description) : 'No description available'}">
               Description...
            </p>
            <div class="d-flex justify-content-between align-items-center">
                <small class="text-muted">
                    By <span th:text="${artwork.uploadedBy.fullName}">Artist Name</span>
                </small>
                <a th:href="@{/artworks/view/{id}(id=${artwork.id})}" class="btn btn-primary btn-sm">
                    <i class="fas fa-eye me-1"></i>View
                </a>
            </div>
        </div>
    </div>
</body>
</html>
